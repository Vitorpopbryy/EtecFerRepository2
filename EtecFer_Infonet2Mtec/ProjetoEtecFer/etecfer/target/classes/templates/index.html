<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema EtecFer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:    #CC0000;
            --red-dk: #A30000;
            --red-lt: #fff0f0;
            --white:  #ffffff;
            --grey:   #f4f4f4;
            --text:   #1a1a1a;
            --muted:  #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--grey);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        header {
            background: var(--red);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 1rem;
        }

        .logo-box {
            background: var(--white);
            color: var(--red);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
        }

        .header-title {
            color: var(--white);
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.92;
        }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            gap: 2.5rem;
        }

        .hero {
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .hero h1 span { color: var(--red); }

        .hero p {
            color: var(--muted);
            font-size: 1rem;
        }

        /* ── Cards ── */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 560px;
        }

        @media (max-width: 480px) {
            .cards { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--white);
            border: 1.5px solid #e5e5e5;
            border-radius: 12px;
            padding: 1.75rem 1.5rem;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
        }

        .card:hover {
            border-color: var(--red);
            box-shadow: 0 6px 24px rgba(204,0,0,0.1);
            transform: translateY(-2px);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            background: var(--red-lt);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--red);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card h2 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .card p {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
            flex: 1;
        }

        .card-link {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--red);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.25rem;
        }

        .card-link svg {
            width: 13px;
            height: 13px;
            stroke: var(--red);
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.15s;
        }

        .card:hover .card-link svg { transform: translateX(3px); }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 1.25rem;
            font-size: 0.78rem;
            color: var(--muted);
            border-top: 1px solid #e5e5e5;
            background: var(--white);
        }
    </style>
</head>
<body>

    <header>
        <span class="logo-box">ETEC</span>
        <span class="header-title">Sistema EtecFer</span>
    </header>

    <main>
        <div class="hero">
            <h1>Bem-vindo ao <span>EtecFer</span></h1>
            <p>Selecione uma área para gerenciar</p>
        </div>

        <nav class="cards">

            <a href="/alunos/listar" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <h2>Gerenciar Alunos</h2>
                <p>Cadastre, edite e consulte os alunos matriculados.</p>
                <span class="card-link">
                    Acessar
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </span>
            </a>

            <a href="/cursos/listar" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                </div>
                <h2>Gerenciar Cursos</h2>
                <p>Organize e configure os cursos técnicos da escola.</p>
                <span class="card-link">
                    Acessar
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </span>
            </a>

        </nav>
    </main>

    <footer>© 2025 EtecFer — Escola Técnica Estadual</footer>

</body>
</html>
