<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Cursos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:    #CC0000;
            --red-dk: #A30000;
            --red-lt: #fff0f0;
            --white:  #ffffff;
            --grey:   #f4f4f4;
            --border: #e5e5e5;
            --text:   #1a1a1a;
            --muted:  #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--grey);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        header {
            background: var(--red);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 1rem;
        }

        .logo-box {
            background: var(--white);
            color: var(--red);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            text-decoration: none;
        }

        .header-title {
            color: var(--white);
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.92;
        }

        /* ── Main ── */
        main {
            flex: 1;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
        }

        /* ── Page header ── */
        .page-header {
            width: 100%;
            max-width: 860px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--red);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.55rem 1.1rem;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-new:hover { background: var(--red-dk); }

        .btn-new svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Table card ── */
        .table-wrap {
            width: 100%;
            max-width: 860px;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--red);
        }

        thead th {
            color: var(--white);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.9rem 1.25rem;
            text-align: left;
        }

        thead th:last-child { text-align: center; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: #fafafa; }

        td {
            padding: 0.9rem 1.25rem;
            font-size: 0.9rem;
            color: var(--text);
            vertical-align: middle;
        }

        /* ── Badge for período ── */
        .badge {
            display: inline-block;
            background: var(--red-lt);
            color: var(--red);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            letter-spacing: 0.02em;
        }

        /* ── Action buttons ── */
        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-edit, .btn-del {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn-edit {
            background: var(--grey);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-edit:hover { background: #ebebeb; }

        .btn-del {
            background: var(--red-lt);
            color: var(--red);
            border: 1px solid #ffd0d0;
        }

        .btn-del:hover { background: #ffd0d0; }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 1.25rem;
            font-size: 0.78rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            background: var(--white);
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo-box">ETEC</a>
        <span class="header-title">Sistema EtecFer</span>
    </header>

    <main>

        <div class="page-header">
            <h1>Lista de Cursos</h1>
            <a href="/cursos/criar" class="btn-new">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo Curso
            </a>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Período</th>
                        <th>Carga Horária</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.nomeCurso}">*</td>
                        <td><span class="badge" th:text="${curso.periodoCurso}">*</span></td>
                        <td th:text="${curso.chCurso}">*</td>
                        <td>
                            <div class="actions">
                                <a class="btn-edit" th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}">Editar</a>
                                <a class="btn-del"  th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}">Excluir</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer>© 2025 EtecFer — Escola Técnica Estadual</footer>

</body>
</html>
